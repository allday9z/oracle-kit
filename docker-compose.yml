# ============================================================
# oracle-kit — Docker Compose (Full Stack)
# ============================================================
#
# Services:
#   oracle-init    Clone/update oracle repos to shared volume
#   oracle-api     oracle-v2 HTTP API + MCP server  (:47778)
#   oracle-studio  3D knowledge map dashboard        (:3000)
#   maw            Fleet web UI + WebSocket           (:3456)
#   ollama         Embedding model server             (:11434) [--profile ollama]
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#
# With local Ollama (Mac recommended — GPU access):
#   docker compose up -d   (oracle-api auto-connects to host Ollama)
#
# With Ollama in Docker:
#   docker compose --profile ollama up -d
# ============================================================

services:

  # ── Init: Clone oracle repos ──────────────────────────────
  # Runs once, clones/pulls all oracle repos to shared volume.
  # Subsequent starts just `git pull` to keep repos fresh.
  oracle-init:
    image: alpine/git:latest
    container_name: oracle-init
    volumes:
      - oracle-repos:/repos
    environment:
      ORACLE_REPOS: ${ORACLE_REPOS:-allday9z/database-oracle allday9z/conductor-oracle allday9z/m2-manager-oracle}
    command: >
      sh -c "
        echo '📦 oracle-init: syncing repos...' &&
        for repo in $${ORACLE_REPOS}; do
          name=$$(basename $$repo)
          if [ -d /repos/$$repo/.git ]; then
            echo \"  → $$repo: pulling\" && git -C /repos/$$repo pull --quiet
          else
            echo \"  → $$repo: cloning\" && mkdir -p /repos/$$repo &&
            git clone --depth 1 https://github.com/$$repo /repos/$$repo
          fi
        done &&
        echo '✅ oracle-init: done'
      "
    restart: "no"
    networks:
      - oracle-net

  # ── oracle-api (HTTP API + MCP) ───────────────────────────
  oracle-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        ORACLE_V2_REPO: https://github.com/allday9z/oracle-v2
    image: oracle-api:latest
    container_name: oracle-api
    restart: unless-stopped
    ports:
      - "${ORACLE_PORT:-47778}:47778"
    volumes:
      - oracle-data:/root/.oracle
      - oracle-repos:/ghq-repos:ro
    environment:
      ORACLE_PORT: 47778
      ORACLE_VECTOR_DB: ${ORACLE_VECTOR_DB:-lancedb}
      ORACLE_EMBEDDING_PROVIDER: ${ORACLE_EMBEDDING_PROVIDER:-ollama}
      ORACLE_VECTOR_DB_PATH: /root/.oracle/lancedb
      ORACLE_REPO_ROOT: /ghq-repos/${ORACLE_PRIMARY_REPO:-allday9z/database-oracle}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      oracle-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:47778/api/health"]
      interval: 20s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - oracle-net

  # ── oracle-studio (3D Dashboard) ─────────────────────────
  oracle-studio:
    build:
      context: .
      dockerfile: Dockerfile.studio
      args:
        STUDIO_REPO: https://github.com/Soul-Brews-Studio/oracle-studio
    image: oracle-studio:latest
    container_name: oracle-studio
    restart: unless-stopped
    ports:
      - "${STUDIO_PORT:-3000}:3000"
    environment:
      ORACLE_API_URL: http://oracle-api:47778
      PORT: 3000
    depends_on:
      oracle-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - oracle-net

  # ── maw (Fleet Web UI + WebSocket) ───────────────────────
  maw:
    build:
      context: .
      dockerfile: Dockerfile.maw
      args:
        MAW_REPO: https://github.com/Soul-Brews-Studio/maw-js
    image: oracle-maw:latest
    container_name: oracle-maw
    restart: unless-stopped
    ports:
      - "${MAW_PORT:-3456}:3456"
    environment:
      MAW_PORT: 3456
      ORACLE_URL: http://oracle-api:47778
    depends_on:
      oracle-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - oracle-net

  # ── ollama (optional: --profile ollama) ──────────────────
  # Default: oracle-api connects to HOST Ollama (Mac GPU access)
  # Use this profile only when running fully in Docker
  ollama:
    image: ollama/ollama:latest
    container_name: oracle-ollama
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_ORIGINS: "*"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - oracle-net
    entrypoint: >
      sh -c "ollama serve &
             sleep 8 &&
             ollama pull nomic-embed-text &&
             wait"

# ── Volumes ────────────────────────────────────────────────
volumes:
  oracle-data:
    name: oracle-data
    # Persists: SQLite DB + LanceDB vectors
  oracle-repos:
    name: oracle-repos
    # Persists: cloned oracle git repos (for indexing)
  ollama-data:
    name: oracle-ollama-data
    # Persists: Ollama model weights

# ── Networks ───────────────────────────────────────────────
networks:
  oracle-net:
    name: oracle-net
    driver: bridge
